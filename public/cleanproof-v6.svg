<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <rect width="400" height="200" fill="#000000"/>
  
  <!-- Abstract mark - circle with integrated check -->
  <g transform="translate(200, 58)">
    <!-- Open circle (C shape) -->
    <path d="M16,-22 C4,-28 -14,-24 -20,-10 C-26,4 -18,24 -2,28 C10,30 20,24 24,16" 
          fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <!-- Check that completes the shape -->
    <path d="M-4,6 L4,14 L20,-4" 
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Wordmark -->
  <text x="200" y="140" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue','Arial',sans-serif" font-weight="600" font-size="40" letter-spacing="-1.5" fill="#FFFFFF">CleanProof</text>
</svg>
